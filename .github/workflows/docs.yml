name: docs

on:
  push:
    branches: [main]
  pull_request:

# This workflow is a GATE only: it fails the pipeline if the docs don't build
# cleanly, so a broken link or missing reference is caught before publishing.
# It does NOT deploy. The Cloudflare Pages project is Direct Upload (not
# git-connected), so a push never updates the live site: deploy by hand with
#   mkdocs build && wrangler pages deploy site --project-name=mfgqc --branch=main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (package + docs extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build docs (strict)
        # --strict turns broken links and unresolved references into failures.
        run: mkdocs build --strict
