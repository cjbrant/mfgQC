name: docs

on:
  push:
    branches: [main]
  pull_request:

# Cloudflare Pages auto-builds and deploys the connected repo on push. This
# workflow is the GATE: it fails the pipeline if the docs don't build cleanly,
# so a broken link or missing reference never reaches the live site.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (package + docs extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build docs (strict)
        # --strict turns broken links and unresolved references into failures.
        run: mkdocs build --strict
