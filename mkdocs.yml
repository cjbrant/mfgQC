site_name: mfgQC
site_description: Auditable SPC, capability, and gage R&R for manufacturing.
site_url: https://mfgqc.brantnersolutions.com
site_author: Brantner Solutions
repo_url: https://github.com/cjbrant/mfgQC
repo_name: cjbrant/mfgQC
copyright: © Brantner Solutions · MIT License

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Jura
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    # mfgQC's CRT-phosphor theme is dark by design (matches mfgqc/palette.py
    # PHOSPHOR and brantnersolutions.com). Force the dark scheme always, like the
    # apex — no light variant.
    scheme: slate
    primary: black
    accent: cyan

extra_css:
  - stylesheets/brand.css

extra_javascript:
  - javascripts/mathjax-config.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/permalink-copy.js

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
      theme: dark
      ignore_h1_titles: false
      show_input: true
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cjbrant/mfgQC
    - icon: fontawesome/solid/globe
      link: https://brantnersolutions.com

nav:
  - Home: index.md
  - User Guide:
      - user-guide/index.md
      - Install: user-guide/install.md
      - Quickstart: guide/quickstart.ipynb
      - Reading the assumption report: guide/assumption-report.ipynb
      - Choosing a control chart: guide/choosing-a-control-chart.ipynb
      - A gage R&R study: guide/gage-rr.ipynb
      - The audit workflow: guide/audit-workflow.ipynb
      - Bayesian capability: guide/bayesian-capability.ipynb
  - Reference:
      - reference/index.md
      - Capability: reference/capability.md
      - Non-normal capability: reference/non-normal-capability.md
      - Attributes & Pareto: reference/attributes.md
      - Control charts: reference/control-charts.md
      - Run rules: reference/run-rules.md
      - Advanced control charts: reference/advanced-charts.md
      - Gage R&R: reference/gage-rr.md
      - Bayesian analytics: reference/bayesian.md
      - Measurement systems analysis: reference/msa.md
      - Hypothesis testing: reference/hypothesis-testing.md
      - Power & sample size: reference/power.md
      - Design of experiments: reference/doe.md
      - Reliability: reference/reliability.md
      - Acceptance sampling: reference/acceptance-sampling.md
      - Provenance model: reference/provenance.md
      - API reference: reference/api.md
      - Bibliography: reference/bibliography.md
  - About: about.md
